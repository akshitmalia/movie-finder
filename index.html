<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Finder</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>

    <style>
        .hidden{
            display:none;
        }
    </style>
         
</head>
<body>
    <div class="card bg-light p-3 border border-primary text-center  mt-3 mb-3">
        <h1 class="display-3 text-primary fw-bold">Movie Finder</h1>
        <p class="fs-5 text-muted">This app will let you search for movies and give relevant information regarding that</p>
        <input autocomplete="off" id="input_id" type="text" placeholder="Search Movies">
        <button onclick="searching()" class="btn btn-danger mt-3 mb-3">Search</button>
    </div>
    <div id="show_grid" class="row g-0 gy-3">

    </div>
    <div id="hidden_details" class="hidden mt-5 mb-4 d-flex justify-content-center">

    </div>
    
</body>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="script.js"></script>
</html>
